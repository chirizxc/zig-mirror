name: "Zig Сodeberg mirror"

on:
  push:
    branches:
      - mirror-workflow

  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mirror
  cancel-in-progress: false

env:
  ZIG_UPSTREAM_URL: https://codeberg.org/ziglang/zig.git

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: "Clone upstream"
        run: |
          git clone --mirror "$ZIG_UPSTREAM_URL" upstream.git

      - name: "Mirror repository"
        working-directory: upstream.git
        env:
          PUSH_TOKEN: ${{ secrets.MIRROR_PAT }}
        run: |
          set -euo pipefail

          url="https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git push --force "$url" 'refs/heads/*:refs/heads/*'

          git push --force "$url" 'refs/tags/*:refs/tags/*'
